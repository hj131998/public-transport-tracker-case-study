version: '3.9'

services:

  bff:
    environment:
      APP_ENV: staging
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '0.5'

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: transport-tracker-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - tracker-net

  grafana:
    image: grafana/grafana:10.4.0
    container_name: transport-tracker-grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - tracker-net

volumes:
  grafana-data:
